<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOODLE</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <header class="header">
        <h1 class="logo">
            <a href="#">
                <img src="./assets/images/LOGO.png" alt="moodle logo">
            </a>
        </h1>

        <nav class="header__nav">
            <ul class="gnb">
                <li class="gnb__menu">
                    <a href="#">
                        Home
                    </a>
                </li>
                <li class="gnb__menu">
                    <a href="#">
                        For You
                    </a>
                </li>
                <li class="gnb__menu">
                    <a href="#" class="gnb__browse">
                        Browse
                        <i class="arrow down"></i>
                        <!-- <img src="./assets/images/gnb_arrow.png" alt="arrow icon"> -->
                    </a>

                    <div class="lnb">
                        <div class="lnb__content">
                            <nav class="lnb__category">
                                <p class="category-label">
                                    CATEGORY
                                </p>
                                <ul class="lnb__menu-list">
                                    <li class="lnb__menu">
                                        <a href="#" data-select="genre" class="on">
                                            장르&테마
                                        </a>
                                    </li>
                                    <li class="lnb__menu">
                                        <a href="#" data-select="new">
                                            신곡&신규 아티스트
                                        </a>
                                    </li>
                                </ul>
                            </nav>

                            <div class="recommend-wrap">
                                <ul class="recommend genre on">
                                    <li class="recommend__card">
                                        <a href="#">
                                            <div class="recommend__img">
                                                <img src="./assets/images/playlist_01.png" alt="album cover image">
                                            </div>
                                            <p class="recommend__title">
                                                헤메는 오후에 하우스로 Playlist
                                            </p>
                                        </a>
                                    </li>
                                    <li class="recommend__card">
                                        <a href="#">
                                            <div class="recommend__img">
                                                <img src="./assets/images/playlist_02.png" alt="album cover image">
                                            </div>
                                            <p class="recommend__title">
                                                Midnight Dance Playlist
                                            </p>
                                        </a>
                                    </li>
                                </ul>
                                <ul class="recommend new">
                                    <Li class="recommend__card">
                                        <a href="#">
                                            <div class="recommend__img">
                                                <img src="./assets/images/album_01.png" alt="album cover image">
                                            </div>
                                            <p class="recommend__title">
                                                REVIVE+
                                            </p>
                                        </a>
                                    </Li>
                                    <Li class="recommend__card">
                                        <a href="#">
                                            <div class="recommend__img">
                                                <img src="./assets/images/album_02.png" alt="album cover image">
                                            </div>
                                            <p class="recommend__title">
                                                Things We Do
                                            </p>
                                        </a>
                                    </Li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </li>
                <li class="gnb__menu">
                    <a href="#">
                        News
                    </a>
                </li>
                <li class="gnb__menu">
                    <a href="#">
                        Contact
                    </a>
                </li>
            </ul>
        </nav>

        <div class="header__right">
            <select>
                <option value="ko">
                    KR
                </option>
                <option value="en">
                    EN
                </option>
            </select>

            <div class="header__btn">
                <a href="#">
                    무료 체험하기
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="visual">
            <div class="visual__bg">
                <video autoplay loop muted>
                    <source src="./assets/images/BG.mp4" type="video/mp4">
                </video>
            </div>
            <div class="visual__wrap">
                <div class="container">
                    <div class="visual__content">
                        <div class="visual__text">
                            <h2 class="visual__main-text">
                                검색하지 않아도
                                <br>
                                음악은 이미 준비되어 있어요
                            </h2>
                            <p class="visual__sub-text">
                                당신의 취향을 이해하는 AI 음악 추천
                            </p>
                        </div>
    
                        <div class="visual__btn">
                            <a href="#">
                                지금 AI 추천받기
                            </a>
                        </div>
                    </div>
    
                    <div class="visual__scroll-down">
                        <div class="scroll-down-wrap">
                            <img src="./assets/images/scroll_down_icon.png" alt="scroll down icon image">
                        </div>
                        <p>
                            scroll down
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="./assets/js/jquery.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
